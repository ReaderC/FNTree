<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no"
    >
    <meta name="renderer" content="webkit">
    <title>FN Tree 设置</title>
    <link rel="stylesheet" href="/vendor/mdui/mdui.css">
    <script src="/vendor/mdui/mdui.global.js"></script>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="settings-shell">
      <section class="panel settings-page">
        <div class="panel-header">
          <div>
            <div class="eyebrow">FN Tree Settings</div>
            <h1 class="settings-title">扫描设置</h1>
            <p>这些配置会作为默认扫描参数保存，后续分析会直接沿用。</p>
          </div>
          <a class="button button-ghost" href="/">返回分析页</a>
        </div>

        <div class="settings-page-grid">
          <label id="searchSettingsAnchor" class="settings-card settings-card-stack">
            <span class="settings-label">主题色</span>
            <span class="settings-help">统一按钮、输入框、强调色和 mdui 组件的主色调。</span>
            <div id="settingTheme" class="segmented-control" role="radiogroup" aria-label="主题色">
              <button class="segmented-option" type="button" data-value="cinnamon">暖棕</button>
              <button class="segmented-option" type="button" data-value="slate">石墨</button>
              <button class="segmented-option" type="button" data-value="forest">森林</button>
              <button class="segmented-option" type="button" data-value="ocean">海蓝</button>
            </div>
          </label>

          <label class="settings-card settings-card-stack">
            <span class="settings-label">统计方式</span>
            <span class="settings-help">默认使用磁盘占用。切换为表观大小后，会更接近文件名义大小。</span>
            <div id="settingScanMode" class="segmented-control" role="radiogroup" aria-label="统计方式">
              <button class="segmented-option" type="button" data-value="disk-usage">磁盘占用</button>
              <button class="segmented-option" type="button" data-value="apparent-size">表观大小</button>
            </div>
          </label>

          <label class="settings-card settings-card-stack">
            <span class="settings-label">前 N 项显示数量</span>
            <span class="settings-help">用于控制默认展示的前 N 个大目录或大文件。</span>
            <div class="stepper" aria-label="前 N 项显示数量">
              <button id="topLimitDecrease" class="stepper-button" type="button" aria-label="减少 1">
                -1
              </button>
              <input
                id="settingTopLimit"
                class="stepper-input"
                type="number"
                min="1"
                max="999"
                step="1"
                inputmode="numeric"
                value="30"
                aria-label="前 N 项显示数量"
              >
              <button id="topLimitIncrease" class="stepper-button" type="button" aria-label="增加 1">
                +1
              </button>
            </div>
          </label>

          <label class="settings-card settings-card-stack">
            <span class="settings-label">Treemap 最大显示块数</span>
            <span class="settings-help">控制 treemap 一次最多展示多少个块，范围 5 到 30。</span>
            <div class="stepper" aria-label="Treemap 最大显示块数">
              <button
                id="treemapVisibleDecrease"
                class="stepper-button"
                type="button"
                aria-label="减少 1"
              >
                -1
              </button>
              <input
                id="settingTreemapVisible"
                class="stepper-input"
                type="number"
                min="5"
                max="30"
                step="1"
                inputmode="numeric"
                value="24"
                aria-label="Treemap 最大显示块数"
              >
              <button
                id="treemapVisibleIncrease"
                class="stepper-button"
                type="button"
                aria-label="增加 1"
              >
                +1
              </button>
            </div>
          </label>

          <label class="settings-card settings-card-stack">
            <span class="settings-label">搜索索引周期（小时）</span>
            <span class="settings-help">控制本地文件索引自动重建的周期，范围 1 到 168 小时。</span>
            <div class="stepper" aria-label="搜索索引周期（小时）">
              <button id="searchIndexIntervalDecrease" class="stepper-button" type="button" aria-label="减少 1">
                -1
              </button>
              <input
                id="settingSearchIndexInterval"
                class="stepper-input"
                type="number"
                min="1"
                max="168"
                step="1"
                inputmode="numeric"
                value="24"
                aria-label="搜索索引周期（小时）"
              >
              <button id="searchIndexIntervalIncrease" class="stepper-button" type="button" aria-label="增加 1">
                +1
              </button>
            </div>
            <span id="searchIndexUpdatedAt" class="settings-help">尚未建立索引</span>
          </label>

          <label class="settings-card settings-card-toggle">
            <span class="settings-copy">
              <span class="settings-label">忽略隐藏目录</span>
              <span class="settings-help">跳过以点开头的目录，减少系统和缓存目录对结果的干扰。</span>
            </span>
            <input id="settingIgnoreHidden" type="checkbox" class="switch-input">
            <span class="switch-ui"></span>
          </label>

          <label class="settings-card settings-card-toggle">
            <span class="settings-copy">
              <span class="settings-label">不跨文件系统</span>
              <span class="settings-help">限制在当前挂载点内扫描，避免跨卷或跨挂载路径扩散。</span>
            </span>
            <input id="settingNoCross" type="checkbox" class="switch-input">
            <span class="switch-ui"></span>
          </label>

          <label class="settings-card settings-card-toggle">
            <span class="settings-copy">
              <span class="settings-label">跟随符号链接</span>
              <span class="settings-help">关闭时更安全，打开后会统计符号链接指向的文件大小。</span>
            </span>
            <input id="settingFollowSymlinks" type="checkbox" class="switch-input">
            <span class="switch-ui"></span>
          </label>

          <label class="settings-card settings-card-toggle">
            <span class="settings-copy">
              <span class="settings-label">并发扫描</span>
              <span class="settings-help">适合 SSD。关闭后会改为顺序扫描，更适合机械盘。</span>
            </span>
            <input id="settingConcurrent" type="checkbox" class="switch-input">
            <span class="switch-ui"></span>
          </label>
        </div>

        <div class="settings-footer">
          <div id="settingsStatus" class="settings-status">正在读取设置</div>
          <div class="settings-actions">
            <a class="button button-ghost" href="/">取消</a>
            <button id="saveSettingsButton" class="button" type="button">保存设置</button>
          </div>
        </div>
      </section>
    </div>

    <script src="/settings.js"></script>
  </body>
</html>
