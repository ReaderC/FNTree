<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no">
    <meta name="renderer" content="webkit">
    <title>FN Tree 设置</title>
    <link rel="stylesheet" href="/vendor/mdui/mdui.css">
    <script src="/vendor/mdui/mdui.global.js"></script>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="settings-shell">
      <section class="panel settings-page">
        <div class="panel-header">
          <div>
            <div class="eyebrow">FN Tree Settings</div>
            <h1 class="settings-title">扫描设置</h1>
            <p>这些配置会作为默认扫描参数保存，后续分析直接沿用。</p>
          </div>
          <a class="button button-ghost" href="/">返回分析页</a>
        </div>

        <div class="settings-page-grid">
          <label class="settings-card settings-card-stack">
            <span class="settings-label">统计方式</span>
            <span class="settings-help">默认使用磁盘占用。切换为表观大小后，会更接近文件名义大小。</span>
            <select id="settingScanMode" class="native-select native-select-wide">
              <option value="disk-usage">磁盘占用</option>
              <option value="apparent-size">表观大小</option>
            </select>
          </label>

          <label class="settings-card settings-card-stack">
            <span class="settings-label">前 N 项显示数量</span>
            <span class="settings-help">用于控制默认展示的前 N 个大目录或大文件。</span>
            <input id="settingTopLimit" class="native-input" type="number" min="1" step="1" placeholder="30">
          </label>

          <label class="settings-card settings-card-toggle">
            <span class="settings-copy">
              <span class="settings-label">忽略隐藏目录</span>
              <span class="settings-help">跳过以点开头的目录，减少系统和缓存目录对结果的干扰。</span>
            </span>
            <input id="settingIgnoreHidden" type="checkbox" class="switch-input">
            <span class="switch-ui"></span>
          </label>

          <label class="settings-card settings-card-toggle">
            <span class="settings-copy">
              <span class="settings-label">不跨文件系统</span>
              <span class="settings-help">限制在当前挂载点内扫描，避免跨卷或跨挂载路径扩散。</span>
            </span>
            <input id="settingNoCross" type="checkbox" class="switch-input">
            <span class="switch-ui"></span>
          </label>

          <label class="settings-card settings-card-toggle">
            <span class="settings-copy">
              <span class="settings-label">跟随符号链接</span>
              <span class="settings-help">关闭时更安全，打开后会统计符号链接指向的文件大小。</span>
            </span>
            <input id="settingFollowSymlinks" type="checkbox" class="switch-input">
            <span class="switch-ui"></span>
          </label>

          <label class="settings-card settings-card-toggle">
            <span class="settings-copy">
              <span class="settings-label">并发扫描</span>
              <span class="settings-help">适合 SSD。关闭后会改为顺序扫描，更适合机械盘。</span>
            </span>
            <input id="settingConcurrent" type="checkbox" class="switch-input">
            <span class="switch-ui"></span>
          </label>
        </div>

        <div class="settings-footer">
          <div id="settingsStatus" class="settings-status">正在读取设置</div>
          <div class="settings-actions">
            <a class="button button-ghost" href="/">取消</a>
            <button id="saveSettingsButton" class="button" type="button">保存设置</button>
          </div>
        </div>
      </section>
    </div>

    <script src="/settings.js"></script>
  </body>
</html>
