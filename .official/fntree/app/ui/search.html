<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no">
    <meta name="renderer" content="webkit">
    <title>FN Tree 文件搜索</title>
    <link rel="stylesheet" href="/vendor/mdui/mdui.css">
    <script src="/vendor/mdui/mdui.global.js"></script>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="settings-shell search-shell">
      <section class="panel search-page-panel">
        <div class="panel-header">
          <div>
            <div class="eyebrow">FN Tree Search</div>
            <h1 class="settings-title">文件搜索</h1>
            <p>快速搜索走 plocate/locate 索引，实时搜索走 fd/fdfind。搜索结果只会落在已授权目录内。</p>
          </div>
          <div class="header-actions">
            <a class="button button-ghost" href="/">返回空间分析</a>
            <a class="button button-ghost" href="/settings.html">扫描设置</a>
          </div>
        </div>

        <div class="search-page-grid">
          <section class="settings-card search-control-card">
            <div class="search-control-head">
              <div>
                <div class="settings-label">搜索模式</div>
                <div class="settings-help">快速搜索适合秒开查路径，实时搜索适合查刚新增的文件。</div>
              </div>
              <div id="searchModeGroup" class="segmented-control" role="radiogroup" aria-label="搜索模式">
                <button class="segmented-option" type="button" data-mode="quick">快速搜索</button>
                <button class="segmented-option" type="button" data-mode="live">实时搜索</button>
              </div>
            </div>

            <div class="search-form-grid">
              <label class="field">
                <span class="field-label">搜索范围</span>
                <select id="searchBasePath" class="theme-select">
                  <option value="">全部已授权目录</option>
                </select>
              </label>

              <label class="field">
                <span class="field-label">关键词</span>
                <input
                  id="searchQuery"
                  class="theme-input"
                  type="text"
                  placeholder="例如：movie、.mkv、Conan"
                  autocomplete="off"
                >
              </label>

              <label class="field">
                <span class="field-label">结果上限</span>
                <input
                  id="searchLimit"
                  class="theme-input"
                  type="number"
                  min="10"
                  max="200"
                  step="10"
                  value="50"
                >
              </label>
            </div>

            <div class="search-action-row">
              <mdui-button id="searchSubmitButton" variant="filled">开始搜索</mdui-button>
              <mdui-button id="searchResetButton" variant="tonal">清空结果</mdui-button>
              <div id="searchSummary" class="settings-status">正在读取搜索能力</div>
            </div>
          </section>

          <section class="settings-card search-status-card">
            <div class="metric-label">搜索能力</div>
            <div id="searchBackendLabel" class="metric-value search-metric-value">检测中</div>
            <div id="searchBackendMeta" class="metric-meta">等待后端返回搜索能力</div>
          </section>
        </div>

        <div class="search-results-grid">
          <section class="settings-card search-results-card">
            <div class="search-results-header">
              <div>
                <div class="card-title">结果列表</div>
                <div id="searchResultMeta" class="settings-help">输入关键词后开始搜索</div>
              </div>
            </div>
            <div id="searchResultList" class="search-result-list list-empty">还没有搜索结果</div>
          </section>

          <section class="settings-card search-detail-card">
            <div class="card-title">结果详情</div>
            <div id="searchSelection" class="selection-empty">点击左侧结果查看详情</div>
            <div class="inspector-actions search-detail-actions">
              <mdui-button id="searchCopyPathButton" variant="filled-tonal">复制路径</mdui-button>
              <mdui-button id="searchOpenInFilesButton" variant="text">在文件管理器中打开</mdui-button>
            </div>
          </section>
        </div>
      </section>
    </div>

    <script src="/search.js"></script>
  </body>
</html>
